name: Fetch Verdensbanken WDI (folketall)

on:
  # WDI oppdateres sjelden - månedlig sjekk er nok.
  schedule:
    - cron: "0 7 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kjør WDI-fetch (folketall)
        id: fetch
        run: python -m src.ingest.fetch_wdi
        continue-on-error: true

      - name: Regenerer prosesserte CSV-er
        if: steps.fetch.outcome == 'success'
        run: python -m src.ingest.normalize

      - name: Commit og push hvis endret
        if: steps.fetch.outcome == 'success'
        run: |
          if [ -n "$(git status --porcelain data/reference/ data/processed/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/reference/folketall.json data/processed/
            git commit -m "data: oppdater folketall (WDI) $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Ingen endring i folketall.json."
          fi

      - name: Opprett Issue ved feil
        if: steps.fetch.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DATA] Automatisk henting av folketall feilet ${new Date().toISOString().slice(0,10)}`,
              labels: ["data", "wdi", "bug"],
              body: `Workflow \`fetch-wdi.yml\` feilet. Sannsynlig årsak: WDI-endepunkt utilgjengelig eller endret struktur.\n\nSe workflow-logg: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nAnsvar: \`dataingenior\`.`
            })
