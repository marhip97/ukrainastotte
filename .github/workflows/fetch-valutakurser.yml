name: Fetch valutakurser (EUR/NOK fra Norges Bank)

on:
  # Norges Bank publiserer nye kurser på bankdager. Daglig sjekk
  # holder valutakurser.json oppdatert med kun små diff-er.
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install -r requirements.txt

      - name: Kjør valutakurs-fetch
        id: fetch
        run: python -m src.ingest.fetch_valutakurser
        continue-on-error: true

      - name: Re-normaliser slik at tidsserie/NOK regenereres
        id: normalize
        if: steps.fetch.outcome == 'success'
        run: python -m src.ingest.normalize
        continue-on-error: true

      - name: Commit og push hvis endret
        if: steps.fetch.outcome == 'success' && steps.normalize.outcome == 'success'
        run: |
          if [ -n "$(git status --porcelain data/reference/ data/processed/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/reference/valutakurser.json data/processed/
            git commit -m "data: oppdater EUR/NOK-kurser og regenerer tidsserie ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "Ingen endring i valutakurser.json eller processed-filer."
          fi

      - name: Opprett Issue ved feil
        if: steps.fetch.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DATA] Automatisk henting av valutakurser feilet ${new Date().toISOString().slice(0,10)}`,
              labels: ["data", "valutakurser", "bug"],
              body: `Workflow \`fetch-valutakurser.yml\` feilet. Sannsynlig årsak: Norges Bank-endepunkt utilgjengelig eller endret SDMX-struktur.\n\nSe workflow-logg: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nAnsvar: \`dataingenior\`.`
            })
